<form class="row mb-3" [formGroup]="filtersForm" (ngSubmit)="applyFilters()">

  <!-- Employee Name -->
  <div class="col-md-3">
    <label class="form-label">Employee Name</label>
    <input type="text" class="form-control" formControlName="employeeName" placeholder="Search employee">
  </div>

  <!-- From Date -->
  <div class="col-md-2">
    <label class="form-label">From Date</label>
    <input type="date" class="form-control" formControlName="fromDate">
  </div>

  <!-- To Date -->
  <div class="col-md-2">
    <label class="form-label">To Date</label>
    <input type="date" class="form-control" formControlName="toDate" [min]="filtersForm.value.fromDate">

  </div>

  <!-- Asset Type -->
  <div class="col-md-3">
    <label>Asset Type <span class="text-danger">*</span></label>
    <select class="form-select" formControlName="assetType">
      <option value="">Select Asset Type</option>
      <option *ngFor="let type of assetTypes" [ngValue]="type.assetTypeId">
        {{ type.assetTypeName }}
      </option>

    </select>


  </div>




  <div class="col-md-2">
    <label class="form-label">Status</label>
    <select class="form-select" formControlName="assetStatusID">
      <option value="">All</option>
      <option *ngFor="let s of assetStatuses" [value]="s.assetStatusId">
        {{ s.assetStatusName }}
      </option>
    </select>
  </div>



  <div class="col-md-2 d-flex align-items-end">
    <button class="btn btn-primary w-100" type="submit">
      Filter
    </button>
  </div>

</form>

<!-- ======================================================= -->
<!-- TABLE -->
<!-- ======================================================= -->
<div class="dashboard-tables full-row mt-2">
  <div class="table-card">
    <h3>Asset Approvals</h3>

    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>
            <input type="checkbox" (change)="toggleAll($event)">
          </th>
          <th>Request ID</th>
          <th>Employee Name</th>
          <th>Asset Type</th>
          <th>Required Date</th>
          <th>Priority</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of pagedAssets">

          <!-- SELECT -->
          <td>
            <input type="checkbox" [(ngModel)]="r.checked" [disabled]="r.approvalStatus !== 'Pending'" />
          </td>

          <!-- DATA -->
          <td>{{ r.assetID }}</td>
          <td>{{ r.employeeName }}</td>
          <td>{{ r.assetTypeName }}</td>

          <td>{{ r.requiredDate | date:'dd-MM-yyyy' }}</td>

          <!-- PRIORITY -->
          <td>

            {{ r.priorityName }}

          </td>

          <!-- STATUS -->
          <td>
            <span class="badge" [ngClass]="{
            'bg-warning': r.approvalStatus === 'Pending',
            'bg-success': r.approvalStatus === 'Approved',
            'bg-danger': r.approvalStatus === 'Rejected'
          }">
              {{ r.approvalStatus }}
            </span>
          </td>

        </tr>

        <tr *ngIf="noVisibleAssets">
          <td colspan="7" class="text-center text-muted">
            No records found
          </td>
        </tr>
      </tbody>
    </table>


    <!-- ======================================================= -->
    <!-- ACTION BUTTONS -->
    <!-- ======================================================= -->
    <div class="mt-2">
      <button class="btn btn-success btn-sm me-2" (click)="approveRejectAssets('Approved')">
        Approve Selected
      </button>

      <button class="btn btn-danger btn-sm" (click)="approveRejectAssets('Rejected')">
        Reject Selected
      </button>
    </div>

    <!-- ======================================================= -->
    <!-- PAGINATION -->
    <!-- ======================================================= -->
    <!-- ================= PAGINATION ================= -->
    <div class="d-flex justify-content-between align-items-center mt-3">

      <!-- PAGE SIZE -->
      <div>
        <label>
          Show
          <select class="form-select d-inline w-auto ms-2" [(ngModel)]="pageSize"
            (ngModelChange)="changePageSize($event)">
            <option *ngFor="let size of pageSizeOptions" [value]="size">
              {{ size }}
            </option>
          </select>
          entries
        </label>
      </div>

      <!-- PAGE NAVIGATION -->
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-secondary btn-sm me-2" (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1">
          Previous
        </button>

        <span class="mx-2">
          Page {{ currentPage }} of {{ totalPages }}
        </span>

        <button class="btn btn-outline-secondary btn-sm ms-2" (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === totalPages">
          Next
        </button>
      </div>

    </div>

  </div>
</div>
