<div class="card shadow-sm">
    <div class="container-fluid p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-semibold mb-0">
                <i class="fa-solid fa-tags me-2 text-danger"></i> Asset Category
            </h4>
        </div>

        <hr />

        <!-- FORM -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
                    <div class="row g-3">

                        <!-- Name -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Asset Category *</label>
                            <input type="text" class="form-control" [(ngModel)]="model.assetCategoryName" name="name"
                                required placeholder="Enter Asset Category">
                        </div>

                        <!-- Description -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Description</label>
                            <input type="text" class="form-control" [(ngModel)]="model.description" name="desc"
                                placeholder="Enter Description">
                        </div>

                        <!-- Company -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Company *</label>
                            <select class="form-select" [(ngModel)]="model.companyId" name="company"
                                (change)="onCompanyChange()" required>

                                <option [ngValue]="0">-- Select Company --</option>
                                <option *ngFor="let c of companies" [ngValue]="c.companyId">
                                    {{ c.companyName }}
                                </option>
                            </select>
                        </div>

                        <!-- Region -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Region *</label>
                            <select class="form-select" [(ngModel)]="model.regionId" name="region" required>

                                <option [ngValue]="0">-- Select Region --</option>
                                <option *ngFor="let r of regions" [ngValue]="r.regionID">
                                    {{ r.regionName }}
                                </option>
                            </select>
                        </div>

                        <!-- Toggle -->
                        <div class="col-md-2 d-flex align-items-center mt-4">
                            <label class="me-2 fw-semibold">Is Active</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" [(ngModel)]="model.isActive"
                                    name="active">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="col-md-10 mt-4 text-end">
                            <button class="btn btn-success me-2" [disabled]="!f.valid">
                                {{ isEditMode ? 'Update' : 'Save' }}
                            </button>

                            <button type="button" class="btn btn-secondary" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </div>
                </form>

            </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow-sm">
            <div class="card-body">

                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Region</th>
                            <th class="text-center">Active</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let x of list">
                            <td>{{ x.assetCategoryName }}</td>
                            <td>{{ companyMap[x.companyId] || '—' }}</td>
                            <td>{{ regionMap[x.regionId] || '—' }}</td>

                            <td class="text-center">
                                <i class="fa-solid"
                                    [ngClass]="x.isActive ? 'fa-circle-check text-success' : 'fa-circle-xmark text-danger'">
                                </i>
                            </td>

                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(x)">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>

                                <button class="btn btn-sm btn-outline-danger" (click)="delete(x)">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                        <tr *ngIf="list.length === 0">
                            <td colspan="5" class="text-center text-muted">
                                No records found
                            </td>
                        </tr>

                    </tbody>
                </table>

            </div>
        </div>

    </div>
</div>
