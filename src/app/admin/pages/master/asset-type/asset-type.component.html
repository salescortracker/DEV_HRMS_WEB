<div class="card shadow-sm">
    <div class="container-fluid p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-semibold mb-0">
                <i class="fa-solid fa-box me-2 text-danger"></i> Asset Type
            </h4>
        </div>

        <hr />

        <!-- FORM -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <form #f="ngForm" (ngSubmit)="onSubmit()" novalidate>
                    <div class="row g-3">

                        <!-- Name -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Asset Type *</label>
                            <input type="text" class="form-control" name="name" [(ngModel)]="assetType.assetTypeName"
                                required placeholder="Enter Asset Type">
                        </div>

                        <!-- Description -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Description</label>
                            <input type="text" class="form-control" name="desc" [(ngModel)]="assetType.description"
                                placeholder="Enter Description">
                        </div>

                        <!-- Company -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Company *</label>
                            <select class="form-select" name="company" [(ngModel)]="assetType.companyId"
                                (change)="onCompanyChange()" required>

                                <option [ngValue]="0">-- Select Company --</option>
                                <option *ngFor="let c of companies" [ngValue]="c.companyId">
                                    {{ c.companyName }}
                                </option>
                            </select>
                        </div>

                        <!-- Region -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Region *</label>
                            <select class="form-select" name="region" [(ngModel)]="assetType.regionId" required>

                                <option [ngValue]="0">-- Select Region --</option>
                                <option *ngFor="let r of regions" [ngValue]="r.regionID">
                                    {{ r.regionName }}
                                </option>
                            </select>
                        </div>

                        <!-- Active Toggle -->
                        <div class="col-md-2 d-flex align-items-center mt-4">
                            <label class="me-2 fw-semibold">Is Active</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="active"
                                    [(ngModel)]="assetType.isActive">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="col-md-10 mt-4 text-end">
                            <button class="btn btn-success me-2" type="submit" [disabled]="!f.valid">

                                {{ isEditMode ? 'Update' : 'Save' }}
                            </button>

                            <button class="btn btn-secondary" type="button" (click)="resetForm()">
                                Reset
                            </button>
                        </div>

                    </div>
                </form>

            </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow-sm">
            <div class="card-body">

                <div class="mb-3 d-flex justify-content-end">
                    <input class="form-control w-25" placeholder="Search Asset Type" [(ngModel)]="searchText">
                </div>

                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Region</th>
                            <th class="text-center">Active</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let x of filtered()">
                            <td>{{ x.assetTypeName }}</td>
                            <td>{{ companyMap[x.companyId] || '—' }}</td>
                            <td>{{ regionMap[x.regionId] || '—' }}</td>

                            <td class="text-center">
                                <i class="fa-solid"
                                    [ngClass]="x.isActive ? 'fa-circle-check text-success' : 'fa-circle-xmark text-danger'">
                                </i>
                            </td>

                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(x)">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>

                                <button class="btn btn-sm btn-outline-danger" (click)="delete(x)">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                        <tr *ngIf="filtered().length === 0">
                            <td colspan="5" class="text-center text-muted">
                                No records found
                            </td>
                        </tr>

                    </tbody>
                </table>

            </div>
        </div>

    </div>
</div>
