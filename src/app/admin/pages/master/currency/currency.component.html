<div class="card shadow-sm">
    <div class="container-fluid p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-semibold mb-0">
                <i class="fa-solid fa-money-bill me-2 text-success"></i>
                Currency Master
            </h4>
        </div>

        <hr />

        <!-- FORM -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form #f="ngForm" (ngSubmit)="onSubmit()" novalidate>
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Currency Code *</label>
                            <input class="form-control" name="code" [(ngModel)]="model.currencyCode" required
                                placeholder="Enter Code (USD)">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Currency Name *</label>
                            <input class="form-control" name="name" [(ngModel)]="model.currencyName" required
                                placeholder="Enter Name (Dollar)">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Company *</label>
                            <select class="form-select" name="companyId" [(ngModel)]="model.companyId"
                                (change)="onCompanyChange()" required>

                                <option [ngValue]="0">-- Select Company --</option>
                                <option *ngFor="let c of companies" [ngValue]="c.companyId">
                                    {{ c.companyName }}
                                </option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Region *</label>
                            <select class="form-select" name="regionId" [(ngModel)]="model.regionId" required>

                                <option [ngValue]="0">-- Select Region --</option>
                                <option *ngFor="let r of regions" [ngValue]="r.regionID">
                                    {{ r.regionName }}
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2 d-flex align-items-center mt-4">
                            <label class="me-2 fw-semibold">Is Active</label>
                            <div class="form-check form-switch">
                                <input type="checkbox" class="form-check-input" name="isActive"
                                    [(ngModel)]="model.isActive">
                            </div>
                        </div>

                        <div class="col-md-10 mt-4 text-end">
                            <button class="btn btn-success me-2" [disabled]="!f.valid">
                                {{ isEditMode ? 'Update' : 'Save' }}
                            </button>
                            <button type="button" class="btn btn-secondary" (click)="reset()">Reset</button>
                        </div>

                    </div>
                </form>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow-sm">
            <div class="card-body">

                <div class="mb-3 d-flex justify-content-end">
                    <input class="form-control w-25" placeholder="Search" [(ngModel)]="searchText">
                </div>

                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>S.No</th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Region</th>
                            <th class="text-center">Active</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let x of filtered(); let i = index">
                            <td>{{ i + 1 }}</td>
                            <td>{{ x.currencyCode }}</td>
                            <td>{{ x.currencyName }}</td>
                            <td>{{ companyMap[x.companyId] }}</td>
                            <td>{{ regionMap[x.regionId] }}</td>

                            <td class="text-center">
                                <i class="fa-solid"
                                    [ngClass]="x.isActive ? 'fa-circle-check text-success' : 'fa-circle-xmark text-danger'"></i>
                            </td>

                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(x)">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" (click)="delete(x)">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                        <tr *ngIf="filtered().length === 0">
                            <td colspan="7" class="text-center text-muted">No records found</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>
</div>
